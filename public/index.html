<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>The web site of malajvanilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coming+Soon&display=swap" rel="stylesheet">

  <link href="./style.css" rel="stylesheet" type="text/css" media="all">
  <style>
    .bg-photo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('./resources/cloud.jpg');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      z-index: -2;
    }

    #unicorn-bounce {
      position: fixed;
      width: 35px;
      height: auto;
      z-index: 10;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="bg-photo"></div>
  <img id="unicorn-bounce" src="./resources/unicornbouncelogo.png" alt="">
  <script>
    const unicorn = document.getElementById('unicorn-bounce');
    let x = 100, y = 100, dx = 3.8, dy = 3.2, hue = 0, flipX = 1, flipY = 1, size = 35;
    let touchingX = false, touchingY = false;

    function bounce() {
      const w = unicorn.offsetWidth;
      const h = unicorn.offsetHeight;
      const maxX = window.innerWidth - w;
      const maxY = window.innerHeight - h;

      x += dx;
      y += dy;

      let hitX = false, hitY = false;
      if (x <= 0 || x >= maxX) {
        if (!touchingX) { dx = -dx; flipX *= -1; hue = (hue + 47) % 360; hitX = true; touchingX = true; }
        x = Math.max(0, Math.min(x, maxX));
      } else { touchingX = false; }

      if (y <= 0 || y >= maxY) {
        if (!touchingY) { dy = -dy; flipY *= -1; hue = (hue + 47) % 360; hitY = true; touchingY = true; }
        y = Math.max(0, Math.min(y, maxY));
      } else { touchingY = false; }

      if (hitX || hitY) {
        size = Math.round(size * 1.36);
        unicorn.style.width = size + 'px';
      }

      unicorn.style.left = x + 'px';
      unicorn.style.top = y + 'px';
      unicorn.style.transform = `scaleX(${flipX}) scaleY(${flipY})`;
      unicorn.style.filter = `hue-rotate(${hue}deg) saturate(5) brightness(0.85)`;
      requestAnimationFrame(bounce);
    }

    unicorn.addEventListener('load', bounce);
    if (unicorn.complete) bounce();

    unicorn.addEventListener('click', () => window.location.href = 'https://youtu.be/-Z7UnO66q9w?si=y0JSzl1U10tk4u5s&t=26');
  </script>
  <h1>malajvanilla</h1>
  <p> Play some piano :) </p>


  <!-- Piano: adjust left/top/width/height percentages to fine-tune key positions -->
  <div class="piano-container">
    <img src="resources/piano.png" class="piano-img" alt="Piano keyboard">

    <button id="piano-toggle" title="Sound: OFF" style="
      position: absolute; top: 8%; left: 2%;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #ff3b3b;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      box-shadow: 0 0 8px 3px rgba(255,59,59,0.7), inset 0 0 4px rgba(255,255,255,0.2);
      padding: 0;
    "></button>
    <!-- C3 -->
    <a href="./sub-page/about.html" class="key-overlay" data-label="About" data-freq="130.81"
      style="left: 33.9%; top: 48%; width: 3%; height: 49%;"></a>
    <!-- G3 -->
    <a href="./sub-page/book.html" class="key-overlay" data-label="Book" data-freq="196.00"
      style="left: 44.5%; top: 48%; width: 3%; height: 49%;"></a>

    <!-- C4 -->
    <a href="./sub-page/wibu-shrine.html" class="key-overlay" data-label="Shhh" data-freq="261.63"
      style="left: 54%; top: 48%; width: 3%; height: 49%;"></a>

    <!-- E4 -->
    <a href="https://malajvanilla.neocities.org/journal" class="key-overlay" data-label="Journal" data-freq="329.63"
      style="left: 59.5%; top: 48%; width: 3%; height: 49%;"></a>

    <!-- G4 -->
    <a href="./sub-page/music.html" class="key-overlay" data-label="Music" data-freq="392.00"
      style="left: 64.5%; top: 48%; width: 3%; height: 49%;"></a>

    <!-- B4 -->
    <a href="./sub-page/pikachu-volleyball.html" class="key-overlay" data-label="Pikachu Volleyball" data-freq="493.88"
      style="left: 70.5%; top: 48%; width: 3%; height: 49%;"></a>

    <!-- D5 -->
    <a href="./sub-page/guestbook.html" class="key-overlay" data-label="Guestbook" data-freq="587.33"
      style="left: 76%; top: 48%; width: 3%; height: 49%;"></a>

  </div>

  <div id="tooltip"></div>

  <script>
    let soundEnabled = false;

    const toggle = document.getElementById('piano-toggle');
    toggle.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      toggle.style.background = soundEnabled ? '#3bff6b' : '#ff3b3b';
      toggle.style.boxShadow = soundEnabled
        ? '0 0 8px 3px rgba(59,255,107,0.7), inset 0 0 4px rgba(255,255,255,0.2)'
        : '0 0 8px 3px rgba(255,59,59,0.7), inset 0 0 4px rgba(255,255,255,0.2)';
      toggle.title = soundEnabled ? 'Sound: ON' : 'Sound: OFF';
    });

    const tooltip = document.getElementById('tooltip');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Browsers suspend AudioContext until a user gesture — resume on first interaction
    document.addEventListener('click', () => audioCtx.resume(), { once: true });
    document.addEventListener('mousemove', () => audioCtx.resume(), { once: true });

    function playNote(freq) {
      const gain = audioCtx.createGain();
      const osc = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();

      osc.type = 'triangle';
      osc2.type = 'sine';
      osc.frequency.value = freq;
      osc2.frequency.value = freq * 2; // first overtone, softens the tone

      const g2 = audioCtx.createGain();
      osc.connect(gain);
      osc2.connect(g2);
      gain.connect(audioCtx.destination);
      g2.connect(audioCtx.destination);

      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0.28, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
      g2.gain.setValueAtTime(0.10, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 1.8);

      osc.start(t); osc.stop(t + 3.5);
      osc2.start(t); osc2.stop(t + 1.8);
    }

    document.querySelectorAll('.key-overlay').forEach(key => {
      key.addEventListener('mouseenter', () => {
        tooltip.textContent = key.dataset.label;
        tooltip.style.display = 'block';
        if (soundEnabled) playNote(parseFloat(key.dataset.freq));
      });
      key.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
      });
    });

    document.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 12) + 'px';
    });
  </script>


</body>

</html>
